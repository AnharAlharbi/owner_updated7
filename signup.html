<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Spending Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --petrol-blue: #2C3E50;
            --sage-green: #76937C;
            --error-red: #e74c3c;
            --success-green: #2ecc71;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: white; overflow: hidden;
        }

        .main-container {
            position: relative; height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .background-layers {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .layer-1 { fill: #E5EBE8; } .layer-2 { fill: #CBD6D0; }
        .layer-3 { fill: #A4B9AD; } .layer-4 { fill: #7E998B; }
        .layer-5 { fill: var(--sage-green); }

        /* Language Toggle */
        .lang-toggle {
            position: absolute; top: 20px; left: 40px; z-index: 100;
            display: flex; border-radius: 20px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
        }

        html[dir="rtl"] .lang-toggle { left: auto; right: 40px; }

        .lang-btn {
            padding: 8px 20px; font-size: 13px; font-weight: bold;
            border: none; cursor: pointer; transition: all 0.3s ease;
            background-color: white; color: var(--petrol-blue);
        }

        .lang-btn.active { background-color: var(--sage-green); color: white; }
        .lang-btn:hover:not(.active) { background-color: #f0f4f2; }

        .signup-card {
            position: relative; z-index: 10; background: white;
            padding: 45px 40px 30px 40px; border-radius: 24px;
            width: 90%; max-width: 550px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .back-link {
            position: absolute; top: 25px;
            text-decoration: none; color: var(--sage-green);
            font-size: 15px; display: flex; align-items: center; gap: 6px;
            transition: 0.3s ease; font-weight: 600;
        }

        html[dir="ltr"] .back-link { left: 25px; }
        html[dir="rtl"] .back-link { right: 25px; flex-direction: row-reverse; }
        .back-link:hover { color: var(--petrol-blue); }

        .signup-card h2 { color: var(--petrol-blue); font-size: 24px; margin: 0; }
        .signup-card p { color: #888; font-size: 13px; margin-bottom: 20px; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .input-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }

        html[dir="ltr"] .input-group { text-align: left; }
        html[dir="rtl"] .input-group { text-align: right; }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .input-wrapper i.main-icon { position: absolute; left: 12px; color: #aaa; font-size: 14px; }
        html[dir="rtl"] .input-wrapper i.main-icon { left: auto; right: 12px; }

        .input-wrapper input {
            width: 100%; padding: 10px 12px 10px 35px;
            border: 1px solid #ddd; border-radius: 8px;
            outline: none; transition: 0.3s; box-sizing: border-box; font-size: 14px;
        }

        html[dir="rtl"] .input-wrapper input {
            padding: 10px 35px 10px 12px; text-align: right;
        }

        .input-wrapper input:focus { border-color: var(--sage-green); }

        .right-icons {
            position: absolute; right: 10px;
            display: flex; align-items: center; gap: 10px;
        }

        html[dir="rtl"] .right-icons { right: auto; left: 10px; }

        .status-icon { cursor: pointer; color: #aaa; transition: 0.3s; font-size: 14px; }
        #checkIcon { font-size: 15px; cursor: default; }
        #checkIcon.valid { color: var(--success-green); }
        #checkIcon.invalid { color: var(--error-red); }

        .password-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .submit-btn {
            width: 100%; background-color: var(--sage-green); color: white;
            border: none; padding: 14px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover { background-color: #5d7562; }

        @media (max-width: 600px) { .password-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="background-layers">
        <svg viewBox="0 0 1440 800" preserveAspectRatio="none" style="width: 100%; height: 100%;">
            <path class="layer-1" d="M0,400 Q400,300 1440,500 L1440,800 L0,800 Z" />
            <path class="layer-2" d="M0,500 Q500,400 1440,600 L1440,800 L0,800 Z" />
            <path class="layer-3" d="M0,600 Q600,500 1440,700 L1440,800 L0,800 Z" />
            <path class="layer-4" d="M0,700 Q700,650 1440,750 L1440,800 L0,800 Z" />
            <path class="layer-5" d="M0,750 Q800,730 1440,780 L1440,800 L0,800 Z" />
        </svg>
    </div>

    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">عربي</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="signup-card">
        <a href="index.html" class="back-link" id="backLink"></a>
        <h2 id="signupTitle"></h2>
        <p id="signupSubtitle"></p>

        <form id="signupForm">
            <div class="form-grid">
                <div class="input-group">
                    <label id="facilityLabel"></label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-building main-icon"></i>
                        <input type="text" id="facilityName" required>
                    </div>
                </div>

                <div class="input-group">
                    <label id="crLabel"></label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-file-contract main-icon"></i>
                        <input type="number" id="crNumber" required>
                    </div>
                </div>

                <div class="input-group">
                    <label id="phoneLabel"></label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone main-icon"></i>
                        <input type="tel" id="phone" required placeholder="05xxxxxxxx">
                    </div>
                </div>

                <div class="input-group">
                    <label id="emailLabel"></label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope main-icon"></i>
                        <input type="email" id="email" required placeholder="example@mail.com">
                    </div>
                </div>

                <div class="password-row">
                    <div class="input-group">
                        <label id="passLabel"></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock main-icon"></i>
                            <input type="password" id="pass" required placeholder="••••••">
                            <div class="right-icons">
                                <i class="fa-solid fa-eye status-icon" id="togglePass"></i>
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label id="confirmLabel"></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock main-icon"></i>
                            <input type="password" id="confirmPass" required placeholder="••••••">
                            <div class="right-icons">
                                <i class="fa-solid fa-eye status-icon" id="toggleConfirm"></i>
                                <i class="fa-solid fa-circle-minus status-icon" id="checkIcon"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn"></button>
        </form>
    </div>
</div>

<script>
    const translations = {
        ar: {
            dir: 'rtl', lang: 'ar',
            backLink: '<i class="fa-solid fa-arrow-right-long"></i> رجوع',
            signupTitle: 'إنشاء حساب صاحب عمل',
            signupSubtitle: 'سجّل بيانات منشأتك',
            facilityLabel: 'اسم المنشأة',
            facilityPlaceholder: 'أدخل اسم المنشأة',
            crLabel: 'رقم السجل التجاري',
            crPlaceholder: 'السجل التجاري',
            phoneLabel: 'رقم الجوال',
            emailLabel: 'البريد الإلكتروني',
            passLabel: 'كلمة المرور',
            confirmLabel: 'تأكيد',
            submitBtn: 'إنشاء الحساب',
            successMsg: ' تم إنشاء الحساب بنجاح!',
            passMismatch: ' كلمتا المرور غير متطابقتين!',
            errorMsg: ' خطأ: '
        },
        en: {
            dir: 'ltr', lang: 'en',
            backLink: '<i class="fa-solid fa-arrow-left-long"></i> Back',
            signupTitle: 'Create Owner Account',
            signupSubtitle: 'Register your facility data',
            facilityLabel: 'Facility Name',
            facilityPlaceholder: 'Enter facility name',
            crLabel: 'CR Number',
            crPlaceholder: 'Commercial Registration',
            phoneLabel: 'Phone Number',
            emailLabel: 'E-mail',
            passLabel: 'Password',
            confirmLabel: 'Confirm',
            submitBtn: 'Create Account',
            successMsg: ' Success!',
            passMismatch: ' Passwords do not match!',
            errorMsg: ' Error: '
        }
    };

    let currentLang = 'ar';

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.documentElement.setAttribute('lang', t.lang);
        document.documentElement.setAttribute('dir', t.dir);
        document.getElementById('backLink').innerHTML = t.backLink;
        document.getElementById('signupTitle').textContent = t.signupTitle;
        document.getElementById('signupSubtitle').textContent = t.signupSubtitle;
        document.getElementById('facilityLabel').textContent = t.facilityLabel;
        document.getElementById('facilityName').placeholder = t.facilityPlaceholder;
        document.getElementById('crLabel').textContent = t.crLabel;
        document.getElementById('crNumber').placeholder = t.crPlaceholder;
        document.getElementById('phoneLabel').textContent = t.phoneLabel;
        document.getElementById('emailLabel').textContent = t.emailLabel;
        document.getElementById('passLabel').textContent = t.passLabel;
        document.getElementById('confirmLabel').textContent = t.confirmLabel;
        document.getElementById('submitBtn').textContent = t.submitBtn;
        document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        localStorage.setItem('lang', lang);
    }

    setLang(localStorage.getItem('lang') || 'ar');

    // Password toggle 1
    const passInput = document.getElementById('pass');
    document.getElementById('togglePass').addEventListener('click', function() {
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Password toggle 2
    const confirmInput = document.getElementById('confirmPass');
    document.getElementById('toggleConfirm').addEventListener('click', function() {
        const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Password match check
    const checkIcon = document.getElementById('checkIcon');
    function validatePasswords() {
        const p = passInput.value, cp = confirmInput.value;
        if (cp === "") {
            checkIcon.className = "fa-solid fa-circle-minus status-icon";
        } else if (p === cp) {
            checkIcon.className = "fa-solid fa-circle-check status-icon valid";
        } else {
            checkIcon.className = "fa-solid fa-circle-xmark status-icon invalid";
        }
    }
    passInput.addEventListener('input', validatePasswords);
    confirmInput.addEventListener('input', validatePasswords);

    // Submit
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const t = translations[currentLang];
        if (passInput.value !== confirmInput.value) {
            alert(t.passMismatch);
            return;
        }
        const formData = new FormData();
        formData.append('facilityName', document.getElementById('facilityName').value.trim());
        formData.append('crNumber', document.getElementById('crNumber').value.trim());
        formData.append('phone', document.getElementById('phone').value.trim());
        formData.append('email', document.getElementById('email').value.trim());
        formData.append('password', passInput.value);

        fetch('owner_signup.php', { method: 'POST', body: formData })
        .then(res => res.text())
        .then(data => {
            if (data.trim() === "success") {
                alert(t.successMsg);
                window.location.href = 'login.html';
            } else {
                alert(t.errorMsg + data);
            }
        });
    });
</script>
</body>
</html>
