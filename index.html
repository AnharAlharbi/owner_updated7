<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending Journey</title>
    <style>
        :root {
            --petrol-blue: #2C3E50;
            --sage-green: #76937C;
            --warm-gray: #F4F7F6;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: white; overflow: hidden;
        }

        .main-container {
            position: relative; height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .logo-container {
            position: absolute; top: 20px; right: 40px; z-index: 100;
        }

        /* Language Toggle */
        .lang-toggle {
            position: absolute; top: 20px; left: 40px; z-index: 100;
            display: flex; border-radius: 20px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
        }

        .lang-btn {
            padding: 8px 20px; font-size: 13px; font-weight: bold;
            border: none; cursor: pointer; transition: all 0.3s ease;
            background-color: white; color: var(--petrol-blue);
        }

        .lang-btn.active {
            background-color: var(--sage-green); color: white;
        }

        .lang-btn:hover:not(.active) { background-color: #f0f4f2; }

        .header-text {
            padding: 80px 60px 0 0;
            z-index: 10;
        }

        html[dir="ltr"] .header-text {
            padding: 80px 0 0 60px;
        }

        .header-text h1 {
            color: var(--sage-green);
            font-size: clamp(30px, 5vw, 50px);
            font-weight: 300; font-style: italic;
            line-height: 1.2; margin: 0;
        }

        html[dir="rtl"] .header-text h1 { font-style: normal; }

        .background-layers {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 75%; z-index: 1;
        }

        .layer-1 { fill: #E5EBE8; } .layer-2 { fill: #CBD6D0; }
        .layer-3 { fill: #A4B9AD; } .layer-4 { fill: #7E998B; }
        .layer-5 { fill: var(--sage-green); }

        .footer-content {
            position: relative; z-index: 20;
            padding: 0 60px 60px 60px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        html[dir="rtl"] .footer-content { flex-direction: row-reverse; }

        .description {
            color: white; font-size: clamp(18px, 3vw, 32px);
            font-style: italic; max-width: 50%; line-height: 1.4;
        }

        html[dir="rtl"] .description { font-style: normal; }

        .buttons-group {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .signup-btn {
            background-color: #E2E8E5; color: var(--sage-green);
            border: none; padding: 15px 50px; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s; white-space: nowrap;
        }

        .signup-btn:hover { background-color: #d0ddd7; transform: translateY(-2px); }

        .login-link {
            color: rgba(255,255,255,0.9); text-decoration: none;
            font-size: 14px; white-space: nowrap;
        }

        .login-link span { text-decoration: underline; font-style: italic; }
        html[dir="rtl"] .login-link span { font-style: normal; }

        @media (max-width: 768px) {
            .footer-content { flex-direction: column !important; align-items: flex-start; padding: 30px; }
            .description { max-width: 100%; margin-bottom: 30px; }
            .buttons-group { width: 100%; }
            .lang-toggle { left: 15px; top: 15px; }
            .logo-container { right: 15px; top: 15px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-container">
        <svg width="60" height="60" viewBox="0 0 100 100">
            <rect x="30" y="20" width="40" height="50" rx="5" fill="none" stroke="#2C3E50" stroke-width="2"/>
            <line x1="40" y1="35" x2="60" y2="35" stroke="#2C3E50" stroke-width="2"/>
            <line x1="40" y1="45" x2="60" y2="45" stroke="#2C3E50" stroke-width="2"/>
            <path d="M70 70 Q 80 80 90 60" stroke="#76937C" stroke-width="4" fill="none"/>
        </svg>
    </div>

    <div class="lang-toggle">
        <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">عربي</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="header-text">
        <h1 id="headerTitle"></h1>
    </div>

    <div class="background-layers">
        <svg viewBox="0 0 1440 800" preserveAspectRatio="none" style="width: 100%; height: 100%;">
            <path class="layer-1" d="M0,400 Q400,300 1440,500 L1440,800 L0,800 Z" />
            <path class="layer-2" d="M0,500 Q500,400 1440,600 L1440,800 L0,800 Z" />
            <path class="layer-3" d="M0,600 Q600,500 1440,700 L1440,800 L0,800 Z" />
            <path class="layer-4" d="M0,700 Q700,650 1440,750 L1440,800 L0,800 Z" />
            <path class="layer-5" d="M0,750 Q800,730 1440,780 L1440,800 L0,800 Z" />
        </svg>
    </div>

    <div class="footer-content">
        <div class="description" id="description"></div>
        <div class="buttons-group">
            <a href="signup.html" style="text-decoration: none;">
                <button class="signup-btn" id="signupBtn"></button>
            </a>
            <a href="login.html" class="login-link" id="loginLink"></a>
        </div>
    </div>
</div>

<script>
    const translations = {
        ar: {
            dir: 'rtl', lang: 'ar',
            headerTitle: 'رحلتك المالية<br>تبدأ من هنا',
            description: 'اكتشف رؤى ذكية<br>من فواتيرك بوضوح،<br>بساطة، ومصممة لك.',
            signupBtn: 'إنشاء حساب',
            loginLink: 'لديك حساب بالفعل؟ <span>سجّل دخولك</span>'
        },
        en: {
            dir: 'ltr', lang: 'en',
            headerTitle: 'Your spending journey<br>starts here',
            description: 'Discover smart insights<br>from your bills — clear,<br>simple, and made for you.',
            signupBtn: 'Sign Up',
            loginLink: 'Have an account? <span>Log in</span>'
        }
    };

    function setLang(lang) {
        const t = translations[lang];
        document.documentElement.setAttribute('lang', t.lang);
        document.documentElement.setAttribute('dir', t.dir);
        document.getElementById('headerTitle').innerHTML = t.headerTitle;
        document.getElementById('description').innerHTML = t.description;
        document.getElementById('signupBtn').textContent = t.signupBtn;
        document.getElementById('loginLink').innerHTML = t.loginLink;
        document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        localStorage.setItem('lang', lang);
    }

    setLang(localStorage.getItem('lang') || 'ar');
</script>

</body>
</html>
