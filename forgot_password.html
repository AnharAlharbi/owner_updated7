<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Spending Journey</title>
    <style>
        :root {
            --petrol-blue: #2C3E50;
            --sage-green: #76937C;
            --warm-gray: #F4F7F6;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: white; overflow: hidden;
        }

        .main-container {
            position: relative; height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .background-layers {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .layer-1 { fill: #E5EBE8; } .layer-2 { fill: #CBD6D0; }
        .layer-3 { fill: #A4B9AD; } .layer-4 { fill: #7E998B; }
        .layer-5 { fill: var(--sage-green); }

        .forgot-card {
            position: relative; z-index: 10;
            background: white; padding: 40px;
            border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .back-btn {
            display: block; text-align: left; text-decoration: none;
            color: var(--sage-green); font-size: 18px; margin-bottom: 20px;
        }

        .forgot-card h2 {
            color: var(--petrol-blue); font-size: 26px; margin-bottom: 10px;
        }

        .forgot-card p {
            color: #888; font-size: 13px; line-height: 1.5; margin-bottom: 30px;
        }

        .input-group { text-align: left; margin-bottom: 25px; }
        .input-group label {
            display: block; font-size: 13px; color: #555; margin-bottom: 8px;
        }

        .input-group input {
            width: 100%; padding: 12px; border: 1.5px solid #E0E0E0;
            border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s;
            font-size: 14px;
        }

        .input-group input:focus { border-color: var(--sage-green); }

        .submit-btn {
            width: 100%; background-color: var(--sage-green);
            color: white; border: none; padding: 14px;
            border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .submit-btn:hover:not(:disabled) { background-color: #5f7a64; transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        #message {
            margin-top: 15px;
            font-size: 14px;
            display: none;
            padding: 10px;
            border-radius: 8px;
        }
        .success {
            color: #27ae60;
            background: #eafaf1;
        }
        .error {
            color: #e74c3c;
            background: #fdecea;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="background-layers">
            <svg viewBox="0 0 1440 800" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                <path class="layer-1" d="M0,400 Q400,300 1440,500 L1440,800 L0,800 Z" />
                <path class="layer-2" d="M0,500 Q500,400 1440,600 L1440,800 L0,800 Z" />
                <path class="layer-3" d="M0,600 Q600,500 1440,700 L1440,800 L0,800 Z" />
                <path class="layer-4" d="M0,700 Q700,650 1440,750 L1440,800 L0,800 Z" />
                <path class="layer-5" d="M0,750 Q800,730 1440,780 L1440,800 L0,800 Z" />
            </svg>
        </div>

        <div class="forgot-card">
            <a href="login.html" class="back-btn">‹ Back</a>
            <h2>Forgot Password?</h2>
            <p>Don't worry! Enter the email address associated with your account and we'll send you a reset link.</p>

            <form id="forgotForm">
                <div class="input-group">
                    <label>Enter your email address</label>
                    <input type="email" id="emailInput" placeholder="example@email.com" required>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">Send Reset Link</button>
                <div id="message"></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiszOG1eVQM6n9fAu6Zb7zTwXEa-mOk_E",
            authDomain: "owner-edac5.firebaseapp.com",
            projectId: "owner-edac5",
            storageBucket: "owner-edac5.firebasestorage.app",
            messagingSenderId: "1031081768200",
            appId: "1:1031081768200:web:8654d05f8f39f1d33228bd"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const email  = document.getElementById('emailInput').value.trim();
            const btn    = document.getElementById('submitBtn');
            const msgDiv = document.getElementById('message');

            if (!email) return;

            btn.textContent = "Sending...";
            btn.disabled    = true;
            msgDiv.style.display = 'none';

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    localStorage.setItem('reset_email', email);
                    msgDiv.style.display = 'block';
                    msgDiv.className     = 'success';
                    msgDiv.textContent   = '✓ Check your inbox! A reset link has been sent.';
                    btn.textContent      = '✓ Link Sent';
                })
                .catch((error) => {
                    msgDiv.style.display = 'block';
                    msgDiv.className     = 'error';
                    msgDiv.textContent   = error.code === 'auth/user-not-found'
                        ? 'No account found with this email.'
                        : 'Error: ' + error.message;
                    btn.disabled    = false;
                    btn.textContent = 'Send Reset Link';
                });
        });
    </script>
</body>
</html>
